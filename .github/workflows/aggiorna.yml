name: Promemoria aggiornamento mensile

on:
  schedule:
    - cron: "0 6 2 * *"   # il 2 di ogni mese
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  promemoria:
    runs-on: ubuntu-latest
    steps:
      - name: Apri la issue-promemoria
        uses: actions/github-script@v7
        with:
          script: |
            const oggi = new Date();
            const scorso = new Date(oggi.getFullYear(), oggi.getMonth() - 1, 1);
            const a = scorso.getFullYear();
            const m = String(scorso.getMonth() + 1).padStart(2, "0");
            const titolo = `Aggiornamento dati: scarica il mese ${a}-${m}`;
            const corpo = [
              `È il momento di aggiornare l'archivio con i contratti del mese **${a}-${m}**.`,
              ``,
              `ANAC non permette il download automatico dai server (blocca gli IP esteri), quindi l'aggiornamento va lanciato dal tuo computer. Sono cinque minuti.`,
              ``,
              `Apri il Terminale e incolla questo blocco:`,
              ``,
              "```bash",
              `cd ~/osservatorio`,
              `curl -fL -C - --retry 5 -o dati-grezzi/cig_csv_${a}_${m}.zip \\`,
              `  "https://dati.anticorruzione.it/opendata/download/dataset/cig-${a}/filesystem/cig_csv_${a}_${m}.zip"`,
              `curl -fL -C - --retry 5 -o dati-grezzi/aggiudicazioni_csv.zip \\`,
              `  "https://dati.anticorruzione.it/opendata/download/dataset/aggiudicazioni/filesystem/aggiudicazioni_csv.zip"`,
              `curl -fL -C - --retry 5 -o dati-grezzi/aggiudicatari_csv.zip \\`,
              `  "https://dati.anticorruzione.it/opendata/download/dataset/aggiudicatari/filesystem/aggiudicatari_csv.zip"`,
              `unzip -o dati-grezzi/cig_csv_${a}_${m}.zip -d dati-grezzi/`,
              `python3 script/estrai2.py dati-grezzi/cig_csv_${a}_${m}.csv`,
              `mv accoglienza_${a}_${m}.csv output/`,
              `rm dati-grezzi/cig_csv_${a}_${m}.csv`,
              `python3 script/costruisci.py`,
              `git add output/accoglienza_${a}_${m}.csv sito/data/province.json`,
              `git commit -m "Dati ANAC ${a}-${m}"`,
              `git push`,
              "```",
              ``,
              `Dopo il push, Vercel ridistribuisce da solo. Tra qualche minuto i nuovi contratti di ${a}-${m} sono visibili su https://osservatorio-accoglienza-2tkz.vercel.app`,
              ``,
              `Quando hai finito, chiudi questa issue.`,
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: titolo, body: corpo,
            });
